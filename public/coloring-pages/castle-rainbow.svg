<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <!-- Background border -->
  <rect x="5" y="5" width="390" height="490" rx="15" fill="#FFFFFF" stroke="#333333" stroke-width="6" />

  <!-- Twinkling stars -->
  <g stroke="#333333" stroke-width="4.5" fill="none" stroke-linecap="round">
    <!-- Star 1 -->
    <path d="M 50 60 L 53 66 L 60 68 L 53 70 L 50 76 L 47 70 L 40 68 L 47 66 Z" />
    <!-- Star 2 -->
    <path d="M 330 60 L 333 66 L 340 68 L 333 70 L 330 76 L 327 70 L 320 68 L 327 66 Z" />
    <!-- Star 3 -->
    <path d="M 350 200 L 352 204 L 357 205 L 352 206 L 350 210 L 348 206 L 343 205 L 348 204 Z" stroke-width="3" />
    <!-- Star 4 -->
    <path d="M 40 210 L 42 214 L 47 215 L 42 216 L 40 220 L 38 216 L 33 215 L 38 214 Z" stroke-width="3" />
  </g>

  <!-- Big Arched Rainbow in Background -->
  <g stroke="#333333" stroke-width="5.5" fill="none" stroke-linecap="round">
    <!-- Arch 1 (outer) -->
    <path d="M 40 330 A 170 170 0 0 1 360 330" />
    <!-- Arch 2 -->
    <path d="M 60 330 A 150 150 0 0 1 340 330" stroke-width="5" />
    <!-- Arch 3 -->
    <path d="M 80 330 A 130 130 0 0 1 320 330" stroke-width="4.5" />
    <!-- Arch 4 -->
    <path d="M 100 330 A 110 110 0 0 1 300 330" stroke-width="4" />
    <!-- Arch 5 (inner) -->
    <path d="M 120 330 A 90 90 0 0 1 280 330" stroke-width="3.5" />
  </g>

  <!-- Fantasy Castle floating on Clouds (Middleground) -->
  <g stroke="#333333" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main central tower block -->
    <rect x="170" y="220" width="60" height="90" />
    <!-- Central castle door arch -->
    <path d="M 185 310 Q 200 280 215 310 Z" />
    <path d="M 200 284 L 200 310" stroke-width="3" />
    
    <!-- Central Tower Roof Cone -->
    <path d="M 160 220 L 200 150 L 240 220 Z" />
    <!-- Little flag on top -->
    <path d="M 200 150 L 200 120" />
    <path d="M 200 120 L 222 135 L 200 144 Z" />

    <!-- Left Tower block -->
    <rect x="120" y="240" width="35" height="70" />
    <!-- Roof Cone Left -->
    <path d="M 115 240 L 137.5 190 L 160 240 Z" stroke-width="4" />
    <path d="M 137.5 190 L 137.5 170" stroke-width="3" />
    <path d="M 137.5 170 L 152 180 L 137.5 186 Z" stroke-width="3.5" />
    <!-- Window Left -->
    <path d="M 131 255 Q 137.5 245 144 255 Z" stroke-width="3.5" />
    <path d="M 131 255 L 144 255" stroke-width="3.5" />

    <!-- Right Tower block -->
    <rect x="245" y="240" width="35" height="70" />
    <!-- Roof Cone Right -->
    <path d="M 240 240 L 262.5 190 L 285 240 Z" stroke-width="4" />
    <path d="M 262.5 190 L 262.5 170" stroke-width="3" />
    <path d="M 262.5 170 L 277 180 L 262.5 186 Z" stroke-width="3.5" />
    <!-- Window Right -->
    <path d="M 256 255 Q 262.5 245 269 255 Z" stroke-width="3.5" />
    <path d="M 256 255 L 269 255" stroke-width="3.5" />

    <!-- Castle Wall battlements (top crenellations) -->
    <path d="M 155 270 L 155 260 L 170 260 L 170 270" stroke-width="4" />
    <path d="M 230 270 L 230 260 L 245 260 L 245 270" stroke-width="4" />
  </g>

  <!-- Fluffy Cloud Support Bed (Foreground) -->
  <g stroke="#333333" stroke-width="5.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cloud arches -->
    <path d="M 60 380 Q 90 350 120 370 Q 150 330 200 350 Q 250 330 280 370 Q 310 350 340 380 Q 370 410 340 440 L 60 440 Q 30 410 60 380 Z" fill="#FFFFFF" />
    
    <!-- Cloud facial expressions (makes it adorable for kids!) -->
    <!-- Eyes Left Cloud -->
    <ellipse cx="140" cy="390" rx="4" ry="6" fill="#333333" />
    <ellipse cx="170" cy="390" rx="4" ry="6" fill="#333333" />
    <path d="M 151 398 Q 155 405 159 398" stroke-width="4" />
    
    <!-- Eyes Right Cloud -->
    <ellipse cx="230" cy="390" rx="4" ry="6" fill="#333333" />
    <ellipse cx="260" cy="390" rx="4" ry="6" fill="#333333" />
    <path d="M 241 398 Q 245 405 249 398" stroke-width="4" />

    <!-- Ambient mini clouds floating nearby -->
    <path d="M 300 280 Q 315 265 330 275 Q 345 255 365 270 Q 380 285 365 300 L 300 300 Z" stroke-width="4" />
    <path d="M 30 270 Q 45 255 60 265 Q 75 245 95 260 Q 110 275 95 290 L 30 290 Z" stroke-width="4" />
  </g>
</svg>
