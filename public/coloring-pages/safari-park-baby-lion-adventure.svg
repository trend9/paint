<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background elements -->
  <g id="background-scene">
    <!-- Hills -->
    <path d="M-50 700 Q 200 650 400 680 T 850 670" fill="white" stroke="black" stroke-width="5"/>
    <path d="M-50 750 Q 200 710 400 740 T 850 730" fill="white" stroke="black" stroke-width="5"/>

    <!-- Acacia Tree -->
    <g id="acacia-tree" transform="translate(600, 380)">
      <!-- Trunk -->
      <path d="M0 250 Q 10 200 20 250" fill="white" stroke="black" stroke-width="5"/>
      <rect x="-15" y="250" width="30" height="70" rx="10" ry="10" fill="white" stroke="black" stroke-width="5"/>
      <!-- Canopy -->
      <ellipse cx="0" cy="180" rx="90" ry="45" fill="white" stroke="black" stroke-width="5"/>
      <ellipse cx="0" cy="180" rx="80" ry="35" fill="white" stroke="black" stroke-width="5"/>
      <ellipse cx="0" cy="180" rx="70" ry="25" fill="white" stroke="black" stroke-width="5"/>
    </g>
  </g>

  <!-- Main Subject: Happy Baby Lion Cub -->
  <g id="lion-cub" transform="translate(400, 580)">
    <!-- Body -->
    <ellipse cx="0" cy="150" rx="150" ry="100" fill="white" stroke="black" stroke-width="5"/>

    <!-- Head -->
    <circle cx="0" cy="0" r="120" fill="white" stroke="black" stroke-width="5"/>

    <!-- Mane (simple tufts) -->
    <path d="M-100 -120 Q -150 -100 -140 -50 C -160 0 -100 50 -80 70 Q -60 100 -30 110 T 30 110 Q 60 100 80 70 C 100 50 160 0 140 -50 Q 150 -100 100 -120 Z" fill="none" stroke="black" stroke-width="4"/>

    <!-- Ears -->
    <ellipse cx="-70" cy="-100" rx="40" ry="35" fill="white" stroke="black" stroke-width="5"/>
    <ellipse cx="70" cy="-100" rx="40" ry="35" fill="white" stroke="black" stroke-width="5"/>

    <!-- Face details -->
    <g id="face-details">
      <!-- Eyes -->
      <circle cx="-40" cy="-30" r="25" fill="white" stroke="black" stroke-width="4"/>
      <circle cx="40" cy="-30" r="25" fill="white" stroke="black" stroke-width="4"/>
      <!-- Eye pupils (small circles) -->
      <circle cx="-40" cy="-25" r="10" fill="white" stroke="black" stroke-width="3"/>
      <circle cx="40" cy="-25" r="10" fill="white" stroke="black" stroke-width="3"/>

      <!-- Nose -->
      <path d="M0 20 L -15 0 Q 0 -10 15 0 Z" fill="white" stroke="black" stroke-width="4"/>
      <path d="M-15 0 C -20 5 0 10 0 10 C 0 10 20 5 15 0" fill="white" stroke="black" stroke-width="4"/>

      <!-- Mouth (smile) -->
      <path d="M-40 40 Q 0 70 40 40" fill="none" stroke="black" stroke-width="4"/>

      <!-- Whiskers -->
      <path d="M-50 20 L -90 10" fill="none" stroke="black" stroke-width="3"/>
      <path d="M-55 30 L -95 30" fill="none" stroke="black" stroke-width="3"/>
      <path d="M-50 40 L -90 50" fill="none" stroke="black" stroke-width="3"/>
      <path d="M50 20 L 90 10" fill="none" stroke="black" stroke-width="3"/>
      <path d="M55 30 L 95 30" fill="none" stroke="black" stroke-width="3"/>
      <path d="M50 40 L 90 50" fill="none" stroke="black" stroke-width="3"/>
    </g>

    <!-- Front Paws -->
    <g id="front-paws">
      <ellipse cx="-80" cy="240" rx="50" ry="30" fill="white" stroke="black" stroke-width="5"/>
      <path d="M-80 230 C -100 230 -100 250 -80 250 C -60 250 -60 230 -80 230" fill="none" stroke="black" stroke-width="4"/>
      <path d="M-95 230 C -115 230 -115 250 -95 250" fill="none" stroke="black" stroke-width="4"/>
      <path d="M-65 230 C -45 230 -45 250 -65 250" fill="none" stroke="black" stroke-width="4"/>
      
      <ellipse cx="80" cy="250" rx="50" ry="30" fill="white" stroke="black" stroke-width="5" transform="rotate(-15 80 250)"/>
      <path d="M80 240 C 60 240 60 260 80 260 C 100 260 100 240 80 240" fill="none" stroke="black" stroke-width="4" transform="rotate(-15 80 250)"/>
      <path d="M65 240 C 45 240 45 260 65 260" fill="none" stroke="black" stroke-width="4" transform="rotate(-15 80 250)"/>
      <path d="M95 240 C 115 240 115 260 95 260" fill="none" stroke="black" stroke-width="4" transform="rotate(-15 80 250)"/>
    </g>

    <!-- Hind Legs (simplified) -->
    <path d="M-150 180 Q -200 200 -180 280 C -150 320 -80 300 -100 240 Z" fill="white" stroke="black" stroke-width="5"/>
    <path d="M150 180 Q 200 200 180 280 C 150 320 80 300 100 240 Z" fill="white" stroke="black" stroke-width="5"/>
    
    <!-- Tail -->
    <path d="M-180 180 C -220 150 -200 80 -150 70 C -100 60 -50 90 -20 120" fill="none" stroke="black" stroke-width="5"/>
    <!-- Tail tuft -->
    <ellipse cx="-10" cy="140" rx="20" ry="15" fill="white" stroke="black" stroke-width="4" transform="rotate(30 -10 140)"/>
    <ellipse cx="-10" cy="140" rx="15" ry="10" fill="white" stroke="black" stroke-width="4" transform="rotate(30 -10 140)"/>
  </g>

  <!-- Small, Simple Butterfly -->
  <g id="butterfly" transform="translate(180, 520)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="15" ry="30" fill="white" stroke="black" stroke-width="4"/>
    <!-- Head -->
    <circle cx="0" cy="-35" r="12" fill="white" stroke="black" stroke-width="4"/>
    <!-- Antennas -->
    <path d="M-8 -45 C -15 -60 -5 -70 -5 -70" fill="none" stroke="black" stroke-width="3"/>
    <circle cx="-5" cy="-70" r="3" fill="white" stroke="black" stroke-width="3"/>
    <path d="M8 -45 C 15 -60 5 -70 5 -70" fill="none" stroke="black" stroke-width="3"/>
    <circle cx="5" cy="-70" r="3" fill="white" stroke="black" stroke-width="3"/>

    <!-- Wings -->
    <path d="M-10 -15 Q -60 -40 -60 -10 C -60 20 -10 5 -10 -15" fill="white" stroke="black" stroke-width="4"/>
    <path d="M10 -15 Q 60 -40 60 -10 C 60 20 10 5 10 -15" fill="white" stroke="black" stroke-width="4"/>
    <path d="M-10 15 Q -40 50 -10 55 C 20 50 -10 15 -10 15" fill="white" stroke="black" stroke-width="4"/>
    <path d="M10 15 Q 40 50 10 55 C -20 50 10 15 10 15" fill="white" stroke="black" stroke-width="4"/>
  </g>

</svg>