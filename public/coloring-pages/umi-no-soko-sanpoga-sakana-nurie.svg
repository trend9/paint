<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Coral Reef Base -->
  <g id="coral_reef_base">
    <path d="M0 850 Q200 800 400 850 T800 800 V1000 H0 Z" fill="white" stroke="black" stroke-width="4"/>
  </g>

  <!-- Coral Structures -->
  <g id="coral_structures">
    <!-- Large rounded coral on left -->
    <path d="M100 800 C50 700 80 600 150 550 C220 500 300 550 280 650 C260 750 150 820 100 800 Z" fill="white" stroke="black" stroke-width="5"/>
    <!-- Taller coral in middle -->
    <path d="M400 850 C380 750 420 650 450 600 C480 550 520 600 500 700 C480 800 420 860 400 850 Z" fill="white" stroke="black" stroke-width="5"/>
    <!-- Branching coral on right -->
    <path d="M650 820 C600 750 620 650 680 600 C740 550 780 620 750 700 C720 780 680 840 650 820 Z" fill="white" stroke="black" stroke-width="5"/>
    <path d="M680 600 C670 550 700 500 730 520 C760 540 770 590 730 620 C690 650 685 610 680 600 Z" fill="white" stroke="black" stroke-width="4"/>
    <path d="M700 680 C680 640 700 600 730 610 C760 620 770 660 740 690 C710 720 705 690 700 680 Z" fill="white" stroke="black" stroke-width="4"/>
    <!-- Simple rounded rock/coral on bottom left -->
    <ellipse cx="250" cy="900" rx="100" ry="40" fill="white" stroke="black" stroke-width="4"/>
    <!-- Smaller coral piece bottom right -->
    <path d="M550 900 Q580 850 620 880 Q650 900 630 930 Q600 950 550 900 Z" fill="white" stroke="black" stroke-width="3"/>
  </g>

  <!-- Fish -->
  <g id="fish">
    <!-- Large Playful Clownfish -->
    <g id="clownfish" transform="translate(100, -100)">
      <ellipse cx="300" cy="400" rx="120" ry="70" fill="white" stroke="black" stroke-width="5"/>
      <!-- Tail fin -->
      <path d="M420 400 C450 370 460 430 420 400 Z" fill="white" stroke="black" stroke-width="4"/>
      <!-- Dorsal fin -->
      <path d="M300 330 C290 310 320 300 330 330 Z" fill="white" stroke="black" stroke-width="4"/>
      <!-- Pectoral fin -->
      <path d="M220 450 C200 470 240 480 260 460 Z" fill="white" stroke="black" stroke-width="4"/>
      <!-- Eye -->
      <circle cx="240" cy="380" r="15" fill="white" stroke="black" stroke-width="3"/>
      <circle cx="245" cy="380" r="5" fill="black"/> <!-- Pupil -->
      <!-- Smile -->
      <path d="M230 420 Q245 435 260 420" fill="none" stroke="black" stroke-width="3"/>
      <!-- Stripes for coloring -->
      <path d="M260 340 A100 60 0 0 1 270 460 L270 460 A100 60 0 0 1 260 340 Z" fill="white" stroke="black" stroke-width="3"/>
      <path d="M340 340 A100 60 0 0 1 350 460 L350 460 A100 60 0 0 1 340 340 Z" fill="white" stroke="black" stroke-width="3"/>
    </g>

    <!-- Cheerful Angelfish -->
    <g id="angelfish" transform="translate(400, -150)">
      <!-- Body shape - simplified diamond with rounded edges -->
      <path d="M200 300 L250 400 L200 500 L150 400 Z" fill="white" stroke="black" stroke-width="5"/>
      <!-- Tail fin -->
      <path d="M250 400 C280 380 290 420 250 400 Z" fill="white" stroke="black" stroke-width="4"/>
      <!-- Dorsal fin -->
      <path d="M200 300 C210 280 230 290 200 300 Z" fill="white" stroke="black" stroke-width="4"/>
      <!-- Pelvic fin -->
      <path d="M200 500 C210 520 230 510 200 500 Z" fill="white" stroke="black" stroke-width="4"/>
      <!-- Eye -->
      <circle cx="175" cy="380" r="12" fill="white" stroke="black" stroke-width="3"/>
      <circle cx="178" cy="380" r="4" fill="black"/> <!-- Pupil -->
      <!-- Smile -->
      <path d="M165 410 Q175 425 185 410" fill="none" stroke="black" stroke-width="3"/>
    </g>

    <!-- Small Pufferfish hiding in coral (behind the middle coral) -->
    <g id="pufferfish" transform="translate(300, 30)">
      <circle cx="450" cy="680" r="40" fill="white" stroke="black" stroke-width="4"/>
      <!-- Spikes - simplified as small circles on outline -->
      <circle cx="415" cy="690" r="5" fill="white" stroke="black" stroke-width="2"/>
      <circle cx="420" cy="650" r="5" fill="white" stroke="black" stroke-width="2"/>
      <circle cx="450" cy="640" r="5" fill="white" stroke="black" stroke-width="2"/>
      <circle cx="480" cy="650" r="5" fill="white" stroke="black" stroke-width="2"/>
      <circle cx="485" cy="690" r="5" fill="white" stroke="black" stroke-width="2"/>
      <circle cx="470" cy="710" r="5" fill="white" stroke="black" stroke-width="2"/>
      <circle cx="430" cy="710" r="5" fill="white" stroke="black" stroke-width="2"/>
      <!-- Fin -->
      <path d="M490 680 C500 670 510 690 490 680 Z" fill="white" stroke="black" stroke-width="3"/>
      <!-- Eye -->
      <circle cx="430" cy="670" r="10" fill="white" stroke="black" stroke-width="2"/>
      <circle cx="433" cy="670" r="3" fill="black"/> <!-- Pupil -->
      <!-- Smile -->
      <path d="M425 690 Q435 700 445 690" fill="none" stroke="black" stroke-width="2"/>
    </g>

    <!-- Generic friendly fish 1 -->
    <g id="fish1" transform="translate(50, 50)">
      <ellipse cx="150" cy="200" rx="60" ry="35" fill="white" stroke="black" stroke-width="4"/>
      <path d="M210 200 C230 185 235 215 210 200 Z" fill="white" stroke="black" stroke-width="3"/>
      <path d="M140 165 C130 155 150 150 160 165 Z" fill="white" stroke="black" stroke-width="3"/>
      <path d="M140 235 C130 245 150 250 160 235 Z" fill="white" stroke="black" stroke-width="3"/>
      <circle cx="125" cy="190" r="10" fill="white" stroke="black" stroke-width="2"/>
      <circle cx="128" cy="190" r="3" fill="black"/>
      <path d="M120 210 Q130 220 140 210" fill="none" stroke="black" stroke-width="2"/>
    </g>

    <!-- Generic friendly fish 2 (mirrored) -->
    <g id="fish2" transform="translate(600, 100) scale(-1, 1)">
      <ellipse cx="150" cy="200" rx="60" ry="35" fill="white" stroke="black" stroke-width="4"/>
      <path d="M210 200 C230 185 235 215 210 200 Z" fill="white" stroke="black" stroke-width="3"/>
      <path d="M140 165 C130 155 150 150 160 165 Z" fill="white" stroke="black" stroke-width="3"/>
      <path d="M140 235 C130 245 150 250 160 235 Z" fill="white" stroke="black" stroke-width="3"/>
      <circle cx="125" cy="190" r="10" fill="white" stroke="black" stroke-width="2"/>
      <circle cx="128" cy="190" r="3" fill="black"/>
      <path d="M120 210 Q130 220 140 210" fill="none" stroke="black" stroke-width="2"/>
    </g>
  </g>

  <!-- Bubbles -->
  <g id="bubbles">
    <circle cx="100" cy="200" r="15" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="120" cy="160" r="10" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="135" cy="130" r="7" fill="white" stroke="black" stroke-width="3"/>

    <circle cx="350" cy="150" r="20" fill="white" stroke="black" stroke-width="4"/>
    <circle cx="370" cy="100" r="12" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="390" cy="70" r="8" fill="white" stroke="black" stroke-width="3"/>

    <circle cx="600" cy="250" r="18" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="620" cy="210" r="10" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="630" cy="180" r="6" fill="white" stroke="black" stroke-width="3"/>

    <circle cx="500" cy="500" r="15" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="520" cy="460" r="10" fill="white" stroke="black" stroke-width="3"/>
  </g>
</svg>