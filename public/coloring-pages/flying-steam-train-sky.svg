<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Explicit white background for the entire canvas -->
  <rect x="0" y="0" width="800" height="1000" fill="white"/>

  <!-- Rainbow -->
  <g id="rainbow" stroke="black" stroke-width="5" fill="none">
    <!-- Outer arc -->
    <path d="M 100 500 Q 400 50, 700 500" />
    <!-- Inner arcs - adjust start/end points and control point to maintain spacing -->
    <path d="M 120 510 Q 400 100, 680 510" />
    <path d="M 140 520 Q 400 150, 660 520" />
    <path d="M 160 530 Q 400 200, 640 530" />
    <path d="M 180 540 Q 400 250, 620 540" />
  </g>

  <!-- Clouds -->
  <g id="clouds" stroke="black" stroke-width="4" fill="white">
    <!-- Cloud 1 (left-top) -->
    <path d="M 100 200 Q 150 130 200 200 T 250 170 T 300 200 T 250 250 T 200 220 T 150 250 Q 100 200 100 200 Z" />
    <!-- Cloud 2 (right-top) -->
    <path d="M 500 150 Q 550 80 600 150 T 650 120 T 700 150 T 650 200 T 600 170 T 550 200 Q 500 150 500 150 Z" />
    <!-- Cloud 3 (mid-left) -->
    <path d="M 180 500 Q 230 430 280 500 T 330 470 T 380 500 T 330 550 T 280 520 T 230 550 Q 180 500 180 500 Z" />
    <!-- Cloud 4 (mid-right) -->
    <path d="M 550 450 Q 600 380 650 450 T 700 420 T 750 450 T 700 500 T 650 470 T 600 500 Q 550 450 550 450 Z" />
  </g>

  <!-- Locomotive -->
  <g id="locomotive">
    <!-- Running board / Platform below the boiler -->
    <rect x="230" y="550" width="400" height="40" rx="20" ry="20" stroke="black" stroke-width="5" fill="white"/>

    <!-- Main Boiler -->
    <rect x="250" y="400" width="300" height="150" rx="75" ry="75" stroke="black" stroke-width="5" fill="white"/>

    <!-- Cab -->
    <rect x="520" y="330" width="150" height="150" rx="30" ry="30" stroke="black" stroke-width="5" fill="white"/>
    <!-- Cab Window -->
    <rect x="540" y="350" width="100" height="80" rx="15" ry="15" stroke="black" stroke-width="3" fill="white"/>

    <!-- Chimney Base -->
    <rect x="300" y="330" width="80" height="50" rx="20" ry="20" stroke="black" stroke-width="5" fill="white"/>
    <!-- Chimney Top -->
    <ellipse cx="340" cy="320" rx="50" ry="30" stroke="black" stroke-width="5" fill="white"/>
    <ellipse cx="340" cy="310" rx="40" ry="20" stroke="black" stroke-width="5" fill="none"/> <!-- Opening outline -->

    <!-- Wheels -->
    <g id="wheels" stroke="black" stroke-width="5" fill="white">
      <!-- Front Wheel -->
      <circle cx="300" cy="620" r="60"/>
      <circle cx="300" cy="620" r="30" stroke-width="3"/>
      <!-- Middle Wheel -->
      <circle cx="450" cy="620" r="60"/>
      <circle cx="450" cy="620" r="30" stroke-width="3"/>
      <!-- Back Wheel -->
      <circle cx="600" cy="620" r="60"/>
      <circle cx="600" cy="620" r="30" stroke-width="3"/>
    </g>

    <!-- Connecting Rod for wheels -->
    <rect x="250" y="600" width="400" height="40" rx="20" ry="20" stroke="black" stroke-width="4" fill="white"/>

    <!-- Face on the boiler front (simplified side-on view) -->
    <g id="face">
      <!-- Eyes -->
      <circle cx="300" cy="450" r="30" stroke="black" stroke-width="3" fill="white"/>
      <circle cx="400" cy="450" r="30" stroke="black" stroke-width="3" fill="white"/>
      <!-- Pupils (white fill, black outline only makes them target for coloring) -->
      <circle cx="305" cy="455" r="10" stroke="black" stroke-width="3" fill="white"/>
      <circle cx="405" cy="455" r="10" stroke="black" stroke-width="3" fill="white"/>
      <!-- Mouth -->
      <path d="M 300 500 Q 350 530 400 500" stroke="black" stroke-width="4" fill="none"/>
      <!-- Cheeks -->
      <ellipse cx="280" cy="490" rx="15" ry="10" stroke="black" stroke-width="3" fill="white"/>
      <ellipse cx="420" cy="490" rx="15" ry="10" stroke="black" stroke-width="3" fill="white"/>
    </g>

    <!-- Puffs of smoke from chimney -->
    <g id="smoke" stroke="black" stroke-width="4" fill="white">
      <!-- Smoke puff 1 -->
      <path d="M 340 290 Q 300 230 340 200 Q 380 170 420 200 Q 400 250 340 290 Z"/>
      <!-- Smoke puff 2 (slightly offset) -->
      <path d="M 360 250 Q 320 190 360 160 Q 400 130 440 160 Q 420 210 360 250 Z"/>
    </g>
  </g>
</svg>