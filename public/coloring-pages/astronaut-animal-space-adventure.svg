<svg viewBox="0 0 800 1000">
  <!-- Group for the Rabbit Astronaut -->
  <g id="rabbit-astronaut">
    <!-- Helmet bubble -->
    <circle cx="400" cy="350" r="120" fill="white" stroke="black" stroke-width="5"/>
    <!-- Helmet neck seal -->
    <rect x="350" y="430" width="100" height="40" rx="20" ry="20" fill="white" stroke="black" stroke-width="4"/>

    <!-- Head (inside helmet) -->
    <circle cx="400" cy="350" r="80" fill="white" stroke="black" stroke-width="4"/>

    <!-- Ears (partially above helmet, cartoon style) -->
    <ellipse cx="360" cy="240" rx="25" ry="60" transform="rotate(-15 360 240)" fill="white" stroke="black" stroke-width="4"/>
    <ellipse cx="440" cy="240" rx="25" ry="60" transform="rotate(15 440 240)" fill="white" stroke="black" stroke-width="4"/>

    <!-- Face details -->
    <circle cx="370" cy="325" r="12" fill="white" stroke="black" stroke-width="3"/> <!-- Left eye -->
    <circle cx="430" cy="325" r="12" fill="white" stroke="black" stroke-width="3"/> <!-- Right eye -->
    <ellipse cx="400" cy="350" rx="10" ry="7" fill="white" stroke="black" stroke-width="3"/> <!-- Nose -->
    <path d="M380 370 Q400 385 420 370" fill="none" stroke="black" stroke-width="3"/> <!-- Mouth -->

    <!-- Body -->
    <ellipse cx="400" cy="650" rx="120" ry="180" fill="white" stroke="black" stroke-width="5"/>

    <!-- Arms -->
    <rect x="240" y="500" width="120" height="50" rx="25" ry="25" transform="rotate(-20 240 500)" fill="white" stroke="black" stroke-width="4"/> <!-- Left arm -->
    <rect x="440" y="500" width="120" height="50" rx="25" ry="25" transform="rotate(20 560 500)" fill="white" stroke="black" stroke-width="4"/> <!-- Right arm -->

    <!-- Legs -->
    <rect x="290" y="780" width="60" height="120" rx="30" ry="30" transform="rotate(10 290 780)" fill="white" stroke="black" stroke-width="4"/> <!-- Left leg -->
    <rect x="450" y="780" width="60" height="120" rx="30" ry="30" transform="rotate(-10 510 780)" fill="white" stroke="black" stroke-width="4"/> <!-- Right leg -->
  </g>

  <!-- Group for the Tiny Rocket -->
  <g id="tiny-rocket">
    <!-- Body -->
    <rect x="80" y="470" width="100" height="200" rx="25" ry="25" fill="white" stroke="black" stroke-width="5"/>
    <!-- Nose Cone -->
    <path d="M130 420 L70 470 L190 470 Z" fill="white" stroke="black" stroke-width="5"/>
    <!-- Fins -->
    <path d="M80 620 L40 700 L80 670 Z" fill="white" stroke="black" stroke-width="4"/>
    <path d="M180 620 L220 700 L180 670 Z" fill="white" stroke="black" stroke-width="4"/>
    <!-- Window -->
    <circle cx="130" cy="520" r="25" fill="white" stroke="black" stroke-width="3"/>
  </g>

  <!-- Group for Sparkling Stars -->
  <g id="sparkling-stars">
    <circle cx="680" cy="150" r="15" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="120" cy="100" r="10" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="720" cy="450" r="20" fill="white" stroke="black" stroke-width="4"/>
    <circle cx="150" cy="800" r="12" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="580" cy="880" r="18" fill="white" stroke="black" stroke-width="4"/>
    <circle cx="280" cy="80" r="10" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="750" cy="700" r="15" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="300" cy="180" r="20" fill="white" stroke="black" stroke-width="4"/>
    <circle cx="50" cy="300" r="12" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="700" cy="50" r="10" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="600" cy="280" r="18" fill="white" stroke="black" stroke-width="4"/>
  </g>
</svg>