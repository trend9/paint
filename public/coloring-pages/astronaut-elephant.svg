<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <!-- Background border -->
  <rect x="5" y="5" width="390" height="490" rx="15" fill="#FFFFFF" stroke="#333333" stroke-width="6" />
  
  <!-- Outer Space Environment (Stars and Planets) -->
  <g stroke="#333333" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Star 1 -->
    <path d="M 60 70 L 65 80 L 75 83 L 65 86 L 60 96 L 55 86 L 45 83 L 55 80 Z" />
    <!-- Star 2 -->
    <path d="M 330 80 L 333 88 L 341 90 L 333 92 L 330 100 L 327 92 L 319 90 L 327 88 Z" />
    <!-- Star 3 -->
    <path d="M 80 400 L 83 408 L 91 410 L 83 412 L 80 420 L 77 412 L 69 410 L 77 408 Z" />
    <!-- Planet 1 (Saturn top-left) -->
    <circle cx="80" cy="180" r="20" fill="none" />
    <path d="M 50 180 Q 80 200 110 180" />
    
    <!-- Planet 2 (Moon with craters bottom-right) -->
    <circle cx="320" cy="380" r="30" fill="none" />
    <circle cx="310" cy="370" r="4" />
    <circle cx="330" cy="390" r="6" />
    <circle cx="305" cy="395" r="3" />
  </g>

  <!-- Baby Astronaut Elephant -->
  <g stroke="#333333" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Astronaut Helmet glass (big outer circle) -->
    <circle cx="200" cy="230" r="105" fill="#F4FAFF" opacity="0.9" />
    <circle cx="200" cy="230" r="105" />
    <!-- Helmet reflections -->
    <path d="M 120 180 A 105 105 0 0 1 200 125" stroke-width="3" stroke-dasharray="10 10" />

    <!-- Helmet Suit Connector neck ring -->
    <path d="M 140 330 Q 200 355 260 330" />
    <path d="M 135 340 Q 200 367 265 340" />

    <!-- Outer Spacesuit Body block -->
    <path d="M 145 345 L 125 430 L 275 430 L 255 345 Z" fill="none" />
    <!-- Suit Details -->
    <circle cx="200" cy="390" r="15" fill="none" />
    <path d="M 190 390 L 210 390" />
    <path d="M 200 380 L 200 400" />
    
    <!-- Cute Elephant Head detail inside helmet -->
    <!-- Ears -->
    <path d="M 130 230 Q 100 190 120 160 Q 150 160 155 210" fill="none" />
    <path d="M 270 230 Q 300 190 280 160 Q 250 160 245 210" fill="none" />
    
    <!-- Elephant Head center -->
    <path d="M 155 210 Q 200 170 245 210 L 245 260 Q 200 290 155 260 Z" fill="none" />
    
    <!-- Big cute eyes -->
    <ellipse cx="180" cy="225" rx="8" ry="12" fill="#333333" />
    <circle cx="177" cy="221" r="3" fill="#FFFFFF" />
    
    <ellipse cx="220" cy="225" rx="8" ry="12" fill="#333333" />
    <circle cx="217" cy="221" r="3" fill="#FFFFFF" />
    
    <!-- Blush cheek lines -->
    <path d="M 165 242 L 173 238" stroke-width="3" />
    <path d="M 167 246 L 175 242" stroke-width="3" />
    
    <path d="M 235 242 L 227 238" stroke-width="3" />
    <path d="M 233 246 L 225 242" stroke-width="3" />

    <!-- Cute Trunk (鼻) curved up -->
    <path d="M 200 240 Q 200 275 185 275 Q 170 275 175 260 Q 180 250 195 255" />
    <!-- Trunk crease lines -->
    <path d="M 194 250 Q 200 251 202 249" stroke-width="3" />
    <path d="M 192 258 Q 198 259 200 257" stroke-width="3" />
  </g>
  
  <!-- Tiny astronaut flag -->
  <g stroke="#333333" stroke-width="4" fill="none">
    <path d="M 275 430 L 320 430 L 320 330" />
    <rect x="320" y="330" width="50" height="35" rx="4" />
    <circle cx="345" cy="348" r="8" />
  </g>
</svg>
