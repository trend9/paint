<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" stroke-linecap="round" stroke-linejoin="round">
  <!-- Explicit white background to ensure printability on transparent SVG viewers -->
  <rect x="0" y="0" width="800" height="1000" fill="white" stroke="none" />

  <!-- Forest Elements (Ground, Leaves, Flowers) -->
  <g id="forest_elements">
    <!-- Ground line (a simple hill with area to color) -->
    <path d="M0 800 Q200 750 400 800 T800 800 L800 1000 L0 1000 Z" fill="white" stroke="black" stroke-width="5"/>

    <!-- Large Friendly Leaves -->
    <ellipse cx="100" cy="750" rx="60" ry="30" transform="rotate(-20 100 750)" fill="white" stroke="black" stroke-width="4"/>
    <ellipse cx="700" cy="780" rx="70" ry="35" transform="rotate(15 700 780)" fill="white" stroke="black" stroke-width="4"/>
    <ellipse cx="200" cy="650" rx="50" ry="25" transform="rotate(30 200 650)" fill="white" stroke="black" stroke-width="4"/>
    <ellipse cx="600" cy="680" rx="55" ry="28" transform="rotate(-10 600 680)" fill="white" stroke="black" stroke-width="4"/>

    <!-- Simple Stylized Flowers -->
    <!-- Flower 1 -->
    <circle cx="300" cy="850" r="20" fill="white" stroke="black" stroke-width="3"/> <!-- Center -->
    <circle cx="300" cy="815" r="15" fill="white" stroke="black" stroke-width="3"/> <!-- Petal top -->
    <circle cx="270" cy="835" r="15" fill="white" stroke="black" stroke-width="3"/> <!-- Petal left-top -->
    <circle cx="330" cy="835" r="15" fill="white" stroke="black" stroke-width="3"/> <!-- Petal right-top -->
    <circle cx="270" cy="865" r="15" fill="white" stroke="black" stroke-width="3"/> <!-- Petal left-bottom -->
    <circle cx="330" cy="865" r="15" fill="white" stroke="black" stroke-width="3"/> <!-- Petal right-bottom -->
    <circle cx="300" cy="885" r="15" fill="white" stroke="black" stroke-width="3"/> <!-- Petal bottom -->

    <!-- Flower 2 -->
    <circle cx="500" cy="830" r="25" fill="white" stroke="black" stroke-width="3"/> <!-- Center -->
    <circle cx="500" cy="785" r="20" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="460" cy="800" r="20" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="540" cy="800" r="20" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="460" cy="860" r="20" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="540" cy="860" r="20" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="500" cy="875" r="20" fill="white" stroke="black" stroke-width="3"/>
  </g>

  <!-- Magical Mushroom House -->
  <g id="mushroom_house">
    <!-- Stalk/Base -->
    <path d="M480 800 Q470 650 490 600 C550 500 650 500 710 600 Q730 650 720 800 Z" fill="white" stroke="black" stroke-width="5"/>
    <!-- Door -->
    <ellipse cx="600" cy="700" rx="60" ry="70" fill="white" stroke="black" stroke-width="5"/>
    <!-- Door handle (small circle) -->
    <circle cx="640" cy="700" r="10" fill="white" stroke="black" stroke-width="3"/>

    <!-- Pointed Roof (Mushroom Cap) -->
    <path d="M400 600 Q500 300 700 350 C800 450 700 550 600 600 C500 650 400 600 400 600 Z" fill="white" stroke="black" stroke-width="5"/>
    <!-- Spots on the cap -->
    <circle cx="500" cy="450" r="30" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="650" cy="400" r="35" fill="white" stroke="black" stroke-width="3"/>
    <circle cx="580" cy="530" r="25" fill="white" stroke="black" stroke-width="3"/>
  </g>

  <!-- Cheerful Little Fairy -->
  <g id="fairy">
    <!-- Head -->
    <circle cx="270" cy="500" r="60" fill="white" stroke="black" stroke-width="5"/>
    <!-- Body/Dress (from neck to dress hem) -->
    <path d="M240 560 Q270 570 300 560 L320 620 C350 700 300 780 270 780 C240 780 190 700 220 620 Z" fill="white" stroke="black" stroke-width="5"/>

    <!-- Arms (connected to the body/dress path) -->
    <path d="M230 600 Q190 620 180 670 Q200 690 240 680" fill="white" stroke="black" stroke-width="4"/> <!-- Left Arm -->
    <path d="M310 600 Q350 620 360 670 Q340 690 300 680" fill="white" stroke="black" stroke-width="4"/> <!-- Right Arm -->

    <!-- Legs (simple rounded shapes below the dress) -->
    <ellipse cx="250" cy="740" rx="25" ry="40" fill="white" stroke="black" stroke-width="4"/>
    <ellipse cx="290" cy="740" rx="25" ry="40" fill="white" stroke="black" stroke-width="4"/>

    <!-- Simple rounded wings -->
    <path d="M190 580 C130 500 150 400 220 450 C250 480 190 580 190 580 Z" fill="white" stroke="black" stroke-width="5"/> <!-- Left Wing -->
    <path d="M350 580 C410 500 390 400 320 450 C290 480 350 580 350 580 Z" fill="white" stroke="black" stroke-width="5"/> <!-- Right Wing -->

    <!-- Facial features -->
    <circle cx="245" cy="490" r="10" fill="white" stroke="black" stroke-width="3"/> <!-- Left Eye -->
    <circle cx="295" cy="490" r="10" fill="white" stroke="black" stroke-width="3"/> <!-- Right Eye -->
    <path d="M250 520 Q270 540 290 520" fill="none" stroke="black" stroke-width="3"/> <!-- Smile -->

    <!-- Hair (simple bangs and side sweeps) -->
    <path d="M220 450 Q270 420 320 450 C300 480 240 480 220 450 Z" fill="white" stroke="black" stroke-width="3"/> <!-- Bangs -->
    <path d="M210 500 Q190 530 200 560" fill="none" stroke="black" stroke-width="3"/> <!-- Left hair strand -->
    <path d="M330 500 Q350 530 340 560" fill="none" stroke="black" stroke-width="3"/> <!-- Right hair strand -->
  </g>
</svg>