name: Auto Generate Coloring Page

on:
  schedule:
    # 毎日午前9時と午後9時（日本時間）に自動で実行（1日に2回ぬりえを自動生成・サイト自動更新）
    - cron: '0 0,12 * * *'
  workflow_dispatch: # GitHub UIから「お好みのタイミングでポチッと実行」できる手動ボタン

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-lcm-dreamshaper-v7
          restore-keys: |
            hf-models-

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-models-gemma2-2b
          restore-keys: |
            ollama-models-

      - name: Install Python dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install diffusers transformers accelerate fastapi uvicorn requests pillow pydantic

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama & Local API Server
        run: |
          # Start Ollama
          ollama serve &
          
          # Write local API server script
          cat << 'EOF' > local_api_server.py
          import base64
          import torch
          import requests
          from fastapi import FastAPI, HTTPException
          from pydantic import BaseModel
          from diffusers import DiffusionPipeline, LCMScheduler
          
          app = FastAPI()
          
          print("Loading LCM Stable Diffusion model on CPU...")
          pipe = DiffusionPipeline.from_pretrained("SimianLuo/LCM_Dreamshaper_v7", torch_dtype=torch.float32)
          pipe.scheduler = LCMScheduler.from_config(pipe.scheduler.config)
          pipe.to("cpu")
          print("LCM Model loaded successfully.")
          
          class TextRequest(BaseModel):
              system_prompt: str
              user_prompt: str
          
          class ImageRequest(BaseModel):
              prompt: str
              width: int = 512
              height: int = 512
          
          @app.post("/generate/text")
          async def generate_text(req: TextRequest):
              try:
                  url = "http://localhost:11434/api/chat"
                  payload = {
                      "model": "gemma2:2b",
                      "messages": [
                          {"role": "system", "content": req.system_prompt},
                          {"role": "user", "content": req.user_prompt}
                      ],
                      "stream": False
                  }
                  res = requests.post(url, json=payload, timeout=180)
                  if res.status_code == 200:
                      return {"result": res.json().get("message", {}).get("content", "")}
                  raise HTTPException(status_code=500, detail="Ollama returned error")
              except Exception as e:
                  raise HTTPException(status_code=500, detail=str(e))
          
          @app.post("/generate/image")
          async def generate_image(req: ImageRequest):
              try:
                  image = pipe(
                      prompt=req.prompt,
                      num_inference_steps=4,
                      guidance_scale=8.0,
                      width=req.width,
                      height=req.height
                  ).images[0]
                  
                  import io
                  buf = io.BytesIO()
                  image.save(buf, format="JPEG", quality=90)
                  return {"image_base64": base64.b64encode(buf.getvalue()).decode("utf-8")}
              except Exception as e:
                  raise HTTPException(status_code=500, detail=str(e))
          
          if __name__ == "__main__":
              import uvicorn
              uvicorn.run(app, host="127.0.0.1", port=8000)
          EOF
          
          # Wait for Ollama to start
          echo "Waiting for Ollama to start..."
          until curl -s http://localhost:11434 > /dev/null; do sleep 1; done
          echo "Ollama is running. Pulling gemma2:2b..."
          ollama pull gemma2:2b
          
          # Start the local API server in the background
          python local_api_server.py &
          echo "Waiting for local API server to start..."
          until curl -s http://127.0.0.1:8000 > /dev/null; do sleep 1; done
          echo "Local API server is ready!"

      - name: 📦 Install dependencies
        run: npm ci || npm install

      - name: ⚡ Run Coloring Generator Pipeline
        id: generate
        env:
          COLAB_API_URL: "http://127.0.0.1:8000"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node scripts/generate-coloring.js

      - name: 🏗️ Build site with new content
        run: npm run build

      - name: 💾 Commit and Push generated content
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/coloring-pages.json public/coloring-pages/

          # 差分がある場合のみコミットしてプッシュ
          # ※ [skip ci] を使わないことでVercelが自動でリビルド＆デプロイを検知します
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-generate new kids coloring page 🎨"
            git push origin HEAD
          else
            echo "No coloring updates found. Skipping commit."
          fi

      # 🚀 Vercelへのデプロイトークンが設定されている場合は、GHA側から強制即時ビルド・デプロイを叩きます
      - name: ⚡ Deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install --global vercel
          # Vercelプロジェクト情報をプルしてビルド＆プロダクションへデプロイ
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
